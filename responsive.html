<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            background-color: red;
            width: 100%;
            height: 500px;
        }
        @media (max-width: 1080px) {
            .container{
                background-color: yellow;
                color: aliceblue;
                font-size: 50px;
            }
        }
        @media (max-width: 560px) {
            .container{
                background-color: rgb(0, 255, 51);
                color: rgb(3, 94, 174);
                font-size: 30px;
            }
        }
        @media (max-width: 380px) {
            .container{
                background-color: rgb(255, 0, 217);
                color: rgb(143, 174, 3);
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        Hello World
    </div>
</body>
</html>
